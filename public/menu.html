<!DOCTYPE html>
<html class="dark" lang="es">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TowerDefense - Menu</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#fbbf24"
                    },
                    fontFamily: {
                        display: ["Space Grotesk", "sans-serif"]
                    }
                }
            }
        };
    </script>

    <style>
        body {
            background: url('tower_bg_literal.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            z-index: -1;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(251, 191, 36, 0.35);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.45);
        }
    </style>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/menu.js"></script>
</head>

<body class="min-h-screen flex items-center justify-center p-4 text-white font-display">
    <div class="glass-panel w-full max-w-xl rounded-2xl p-8 sm:p-10 text-center">
        <img src="combined_logo.png" alt="Logo" class="h-40 mx-auto mb-6 drop-shadow-[0_0_18px_rgba(251,191,36,0.55)]">
        <h1 class="text-3xl sm:text-4xl font-bold mb-2 text-primary">Elige destino</h1>
        <p class="text-slate-300 mb-8">Selecciona a donde quieres entrar.</p>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <button id="go-shop-btn" class="h-12 rounded-lg bg-primary text-slate-900 font-extrabold uppercase tracking-wide hover:brightness-110 transition">
                Tienda
            </button>
            <button id="go-users-btn" class="h-12 rounded-lg border border-primary text-primary font-extrabold uppercase tracking-wide hover:bg-primary/15 transition">
                Usuarios
            </button>
            <button id="go-game-btn" class="h-12 rounded-lg border border-primary text-primary font-extrabold uppercase tracking-wide hover:bg-primary/15 transition">
                Juego
            </button>
        </div>

        <button id="logout-btn" class="mt-6 text-sm text-slate-300 hover:text-white underline underline-offset-4">
            Cerrar sesion
        </button>
    </div>
</body>
</html>
