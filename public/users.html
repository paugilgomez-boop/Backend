<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TowerDefense - Hall of Fame</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #22c55e;
            --secondary: #22c55e;
            --dark: #1a0f0a;
            --card-bg: rgba(26, 15, 10, 0.75);
            --text: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: url('tower_bg_literal.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(26, 15, 10, 0.4);
            z-index: -1;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #d1a980;
            font-size: 1.1rem;
        }

        /* Grid System */
        .user-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            perspective: 1000px;
        }

        /* Player Card Style */
        .player-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
        }

        .player-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .player-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 64px;
            height: 64px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--dark);
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);
        }

        .player-info h2 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .player-info p {
            color: #64748b;
            font-size: 0.9rem;
        }

        /* Stats Section */
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            display: block;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Loading Spinner */
        .loader {
            display: flex;
            justify-content: center;
            padding: 50px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, .1);
            border-top: 5px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .no-users {
            text-align: center;
            padding: 40px;
            color: #64748b;
            font-size: 1.2rem;
        }

        .back-btn {
            position: absolute;
            top: 40px;
            left: 40px;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--primary);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            .back-btn {
                position: static;
                margin-bottom: 20px;
                justify-content: center;
            }
        }
    </style>
</head>

<body>


    <div class="container">
        <a href="index.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> Volver
        </a>

        <header>
            <img src="combined_logo.png" class="h-32 mx-auto mb-4 filter drop-shadow-[0_0_20px_rgba(0,242,254,0.5)]"
                 alt="Turret Tower">
            <h1>Hall of Fame</h1>
            <p class="subtitle">Los guerreros más valientes de TowerDefense</p>
        </header>



        <div id="loader" class="loader">
            <div class="spinner"></div>
        </div>

        <div id="userGrid" class="user-grid">
            <!-- Users will be loaded here -->
        </div>
    </div>

    <script>
        async function fetchUsers() {
            try {
                const response = await fetch('/dsaApp/game/users');
                const users = await response.json();

                const loader = document.getElementById('loader');
                const grid = document.getElementById('userGrid');

                loader.style.display = 'none';

                if (users.length === 0) {
                    grid.innerHTML = '<div class="no-users">No hay guerreros registrados aún...</div>';
                    return;
                }

                users.forEach((user, index) => {
                    const card = document.createElement('div');
                    card.className = 'player-card';
                    card.style.animationDelay = `${index * 0.1}s`;

                    const initials = user.username.substring(0, 2).toUpperCase();

                    card.innerHTML = `
                        <div class="player-header">
                            <div class="avatar">${initials}</div>
                            <div class="player-info">
                                <h2>${user.username}</h2>
                                <p>${user.email}</p>
                            </div>
                        </div>
                        <div class="stats">
                            <div class="stat-item">
                                <span class="stat-value">${user.monedas}</span>
                                <span class="stat-label">Monedas</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-value">${user.bestScore}</span>
                                <span class="stat-label">Best Score</span>
                            </div>
                            <div class="stat-item" style="grid-column: span 2; margin-top: 10px;">
                                <span class="stat-value" style="color: #ef4444;">${user.vidaInicial}%</span>
                                <span class="stat-label">Vida</span>
                            </div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                console.error('Error fetching users:', error);
                document.getElementById('loader').innerHTML = '<p style="color: #ef4444;">Error al cargar los guerreros</p>';
            }
        }

        window.onload = function () {
            fetchUsers();
        };
    </script>
</body>

</html>
