<!DOCTYPE html>
<!-- Unified Brand Purple Registration integrated with existing logic -->
<html class="dark" lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TowerDefense - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#22c55e",
                        "secondary": "#ef4444",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    boxShadow: {
                        'glow': '0 0 20px rgba(34, 197, 94, 0.5)',
                        'glow-red': '0 0 20px rgba(239, 68, 68, 0.4)',
                    }
                },
            },
        }
    </script>

    <!-- Custom Styles -->
    <style>
        body {
            background: url('tower_bg_literal.jpg') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            font-family: 'Outfit', sans-serif;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(26, 15, 10, 0.35);
            z-index: -1;
        }

        .glass-panel {
            background: rgba(26, 15, 10, 0.85);
            backdrop-filter: blur(12px);
            border: 2px solid rgba(251, 191, 36, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #1a0f0a inset !important;
            -webkit-text-fill-color: #ffffff !important;
        }

        .turret-tower {
            display: none;
        }
    </style>

    <!-- jQuery & Application Scripts -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="js/common.js?v=1"></script>
    <script src="js/login.js?v=1"></script>
</head>

<body
    class="min-h-screen flex flex-col relative overflow-hidden text-white font-display selection:bg-primary selection:text-black">
    <div class="relative z-10 flex min-h-screen items-center justify-center p-4">

        <div
            class="w-full max-w-[500px] glass-panel rounded-2xl overflow-hidden relative group/card border-t border-white/10">
            <div class="absolute inset-x-0 top-0 h-[2px] bg-primary shadow-[0_0_15px_rgba(34, 197, 94, 0.8)]"></div>
            <div class="absolute inset-x-0 bottom-0 h-[1px] bg-primary/30"></div>

            <div class="p-8 sm:p-10 flex flex-col gap-6 relative z-10 w-full">
                <div class="text-center mb-1 relative">
                    <img src="combined_logo.png" alt="Logo"
                         class="h-52 mx-auto mb-4 drop-shadow-[0_0_20px_rgba(251,191,36,0.6)] hover:scale-105 transition-transform duration-300 relative z-10">
                    <h1
                        class="text-3xl font-bold tracking-tight text-primary mb-2 drop-shadow-[0_0_10px_rgba(34,197,94,0.4)]">
                        Iniciar Sesión</h1>
                </div>




                <form class="flex flex-col gap-5">
                    <div class="flex flex-col gap-1.5 group/input">
                        <label
                            class="text-[11px] uppercase tracking-widest text-primary font-bold ml-1 drop-shadow-[0_0_5px_rgba(251,191,36,0.6)]">Usuario</label>
                        <div
                            class="glow-focus transition-all duration-300 relative rounded-lg border border-white/10 bg-black/60 overflow-hidden group-hover/input:border-primary/50">
                            <input
                                class="w-full bg-transparent border-none text-white placeholder-slate-600 focus:ring-0 h-11 px-4 text-[15px] font-medium tracking-wide"
                                placeholder="@usuario" type="text" name="username" required />
                            <div
                                class="absolute right-3 top-2.5 text-slate-600 pointer-events-none group-focus-within/input:text-primary transition-colors drop-shadow-[0_0_8px_rgba(251,191,36,0.5)]">
                                <span class="material-symbols-outlined text-[20px]">alternate_email</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex flex-col gap-1.5 group/input">
                        <label
                            class="text-[11px] uppercase tracking-widest text-primary font-bold ml-1 drop-shadow-[0_0_5px_rgba(251,191,36,0.6)]">Contraseña</label>
                        <div
                            class="glow-focus transition-all duration-300 relative rounded-lg border border-white/10 bg-black/60 overflow-hidden flex items-center group-hover/input:border-primary/50">
                            <input
                                class="flex-1 bg-transparent border-none text-white placeholder-slate-600 focus:ring-0 h-11 px-4 text-[15px] font-medium tracking-wide"
                                placeholder="••••••••" type="password" name="password" required />
                            <button id="toggle-password"
                                class="px-3 text-slate-600 hover:text-primary transition-colors focus:outline-none hover:drop-shadow-[0_0_8px_rgba(251,191,36,0.5)]"
                                type="button">
                                <span class="material-symbols-outlined text-[20px]">visibility_off</span>
                            </button>
                        </div>
                    </div>

                    <div class="mt-6 flex flex-col gap-4">
                        <button id="login-btn"
                            class="group relative w-full h-12 overflow-hidden rounded-lg bg-primary text-slate-900 font-bold tracking-wide shadow-[0_0_20px_rgba(74, 222, 128, 0.4)] transition-all active:scale-[0.98] hover:bg-primary/90 hover:shadow-[0_0_35px_rgba(74, 222, 128, 0.6)] border border-primary/20">
                            <span
                                class="relative flex items-center justify-center gap-2 font-extrabold uppercase tracking-wider text-sm drop-shadow-sm">
                                Entrar
                                <span
                                    class="material-symbols-outlined text-[20px] transition-transform group-hover:translate-x-1 font-bold">arrow_forward</span>
                            </span>
                        </button>
                    </div>
                </form>

                <div class="mt-2 text-center">
                    <p class="text-slate-400 text-sm">
                        ¿No tienes cuenta?
                        <a class="text-primary hover:text-white font-medium transition-colors drop-shadow-[0_0_5px_rgba(251,191,36,0.4)] hover:drop-shadow-[0_0_12px_rgba(251,191,36,0.8)]"
                            href="register.html">Regístrate</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
